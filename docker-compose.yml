services:
  db:
    image: mysql:8.0
    container_name: outfittrack-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "outfit_track"
      MYSQL_PASSWORD: "123456"
      TZ: "UTC"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./outfit-track
      dockerfile: OutfitTrack.Api/Dockerfile
    container_name: outfittrack-api
    depends_on:
      - db
    environment:
      ASPNETCORE_URLS: "http://+:3002"
      ConnectionStrings__DataBase: "server=db;database=outfit_track;user=root;password=123456"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '>/dev/tcp/localhost/3002'" ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./clothe-system-frontend
      dockerfile: Dockerfile
    container_name: clothe-system-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: outfittrack-phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "123456"
      PMA_DB: outfit_track
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  db_data:
